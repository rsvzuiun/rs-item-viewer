name: Lint

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".github/**.yml"
      - "public/**"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
      - run: vp install
      - run: vp check
